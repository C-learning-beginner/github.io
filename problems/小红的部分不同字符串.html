<h2>小红的部分不同字符串</h2>

<div class="box">
<h4>1. 题目概述</h4>
<p>有一个未知的长度为 n 的字符串，保证该字符串仅由 26 个小写英文字母组成。
    现有 n 个限制条件，用一个数组 a = {a₁, a₂, …, aₙ} 表示，意为 sᵢ ≠ s_{aᵢ}（即字符串中第 i 个字符与第 aᵢ 个字符不同）。
    请你计算在满足所有限制条件的情况下，有多少种不同的字符串。由于答案可能很大，请输出其对 998244353 取模的结果。</p>
</div>

<div class="box">
<h4>2. 简要思考</h4>
